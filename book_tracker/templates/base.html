<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Book Tracker" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div>
      <a class="brand" href="{{ url_for('main.index') }}">Book Tracker</a>
      <p class="subtitle">Личный трекер книг</p>
    </div>
    <nav class="nav">
      <a href="{{ url_for('main.index') }}">Список</a>
      <a class="button" href="{{ url_for('main.create_book') }}">Добавить книгу</a>
    </nav>
  </header>
  <main class="container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
