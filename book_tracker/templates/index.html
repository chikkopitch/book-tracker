{% extends "base.html" %}
{% block content %}
<section class="panel">
  <h1>Список книг</h1>
  <form class="filters" method="get">
    <input type="search" name="q" placeholder="Поиск по названию, автору, жанру" value="{{ query }}">
    <select name="status">
      <option value="">Все статусы</option>
      {% for key, label in status_options.items() %}
        <option value="{{ key }}" {% if status == key %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
    <button type="submit">Применить</button>
  </form>
</section>

<section class="list">
  {% for book in books %}
    <article class="card">
      <div>
        <h2><a href="{{ url_for('main.book_detail', book_id=book.id) }}">{{ book.title }}</a></h2>
        <p>{{ book.author }} · {{ book.genre }} · {{ book.pages }} стр.</p>
      </div>
      <span class="pill">{{ status_options[book.status] }}</span>
    </article>
  {% else %}
    <p class="empty">Пока нет книг. Добавьте первую запись.</p>
  {% endfor %}
</section>
{% endblock %}
